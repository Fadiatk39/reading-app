 <!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تسجيل الدخول</title>

<style>
body{
font-family:Cairo;
text-align:center;
background:#f5f1e8;
}

.box{
margin-top:100px;
background:white;
padding:20px;
border-radius:12px;
display:inline-block;
}

input{
padding:10px;
margin:5px;
width:200px;
border-radius:10px;
border:none;
}

button{
padding:10px;
border:none;
border-radius:10px;
background:#c8a97e;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>🔐 تسجيل الدخول</h2>

<input id="email" placeholder="البريد">
<input id="pass" type="password" placeholder="كلمة المرور">

<br><br>

<button onclick="login()">دخول</button>

<p><a href="register.html">إنشاء حساب</a></p>
</div>

<script>
function login(){
window.location="index.html";
}
</script>

</body>
</html>
